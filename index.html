<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced First Aid Calculator</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2d5a27">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <div class="top-bar">
            <h2>First Aid Procurement</h2>
            <div class="global-controls">
                <select id="theme-selector" onchange="applyTheme(this.value)"></select>
                <button class="btn-settings" id="toggle-settings-btn" onclick="toggleSettings()">⚙️ Settings</button>
                <button class="btn-print" onclick="openPrintModal()">🖨️ Print Reorder List</button>
            </div>
        </div>

        <div id="settings-panel" style="display: none;"></div>

        <div class="header-panel" id="header-panel"></div>
        <div class="tabs" id="tabs-container"></div>
        <div class="kit-board" id="active-content"></div>
    </div>

    <div id="print-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>Select Categories to Print</h3>
            <div id="print-category-list"></div>
            <div class="modal-actions">
                <button onclick="executePrint()" class="btn-add">Print to PDF / Paper</button>
                <button onclick="closePrintModal()" class="btn-delete" style="color: black;">Cancel</button>
            </div>
        </div>
    </div>

    <div id="theme-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="width: 500px;">
            <h3 id="theme-modal-title">Create Custom Theme</h3>
            <div class="input-group" style="margin-bottom: 15px;">
                <label>Theme Name</label>
                <input type="text" id="new-theme-name" placeholder="e.g., Midnight Shift">
            </div>
            
            <div class="color-grid">
                <div><label>Primary (Buttons, Highlights)</label><input type="color" id="c-primary" value="#1a73e8"></div>
                <div><label>Primary Hover</label><input type="color" id="c-primary-hover" value="#1557b0"></div>
                <div><label>Surface (Cards, Backgrounds)</label><input type="color" id="c-surface" value="#ffffff"></div>
                <div><label>App Background</label><input type="color" id="c-background" value="#f8f9fa"></div>
                <div><label>Main Text</label><input type="color" id="c-text-main" value="#202124"></div>
                <div><label>Muted Text / Subheaders</label><input type="color" id="c-text-muted" value="#5f6368"></div>
                <div><label>Borders</label><input type="color" id="c-border" value="#dadce0"></div>
                <div><label>Danger (Delete Buttons, Alerts)</label><input type="color" id="c-danger" value="#ea4335"></div>
                <div><label>Print Button</label><input type="color" id="c-print" value="#34a853"></div>
                <div><label>Print Hover</label><input type="color" id="c-print-hover" value="#2b8c45"></div>
                <div style="grid-column: span 2;"><label>Inactive Tab Background</label><input type="color" id="c-tab-inactive" value="#e8eaed"></div>
            </div>

            <div class="modal-actions">
                <button id="btn-save-theme" onclick="saveTheme()" class="btn-add">Save Theme</button>
                <button onclick="closeThemeModal()" class="btn-delete" style="color: black;">Cancel</button>
            </div>
        </div>
    </div>

    <div id="print-area" class="print-only"></div>

    <script src="script.js"></script>
    <script>
        // Check if the browser actually supports service workers
        if ('serviceWorker' in navigator) {
            // Wait for the page to fully load before registering
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('Service Worker successfully registered with scope:', registration.scope);
                    })
                    .catch(error => {
                        console.error('Service Worker registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
